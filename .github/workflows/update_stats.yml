name: Update Stats Table
on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Professional Yearly Stats
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          # Calculate current year and date range
          YEAR=$(date +%Y)
          START_DATE="${YEAR}-01-01T00:00:00Z"
          START_EPOCH=$(date -d "${YEAR}-01-01" +%s)
          TO_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Target Year: $YEAR"
          echo "Start Epoch: $START_EPOCH"

          # Query for yearly engineering metrics including repo list
          QUERY="query(\$from: DateTime!, \$to: DateTime!) {
            viewer {
              login
              contributionsCollection(from: \$from, to: \$to) {
                totalCommitContributions
                totalPullRequestContributions
                contributionCalendar {
                  weeks {
                    contributionDays {
                      contributionCount
                      date
                    }
                  }
                }
                commitContributionsByRepository(maxRepositories: 100) {
                  repository {
                    name
                    owner { login }
                  }
                }
              }
              repositories(first: 100, ownerAffiliations: OWNER) {
                totalCount
                nodes {
                  name
                  owner { login }
                  stargazerCount
                }
              }
            }
          }"
          
          RESPONSE=$(gh api graphql -f query="$QUERY" -f from="$START_DATE" -f to="$TO_DATE")
          
          USER_LOGIN=$(echo $RESPONSE | jq -r '.data.viewer.login')
          COMMITS=$(echo $RESPONSE | jq '.data.viewer.contributionsCollection.totalCommitContributions')
          PRS=$(echo $RESPONSE | jq '.data.viewer.contributionsCollection.totalPullRequestContributions')
          ACTIVE_DAYS=$(echo $RESPONSE | jq '.data.viewer.contributionsCollection.contributionCalendar.weeks[].contributionDays[] | select(.contributionCount > 0)' | jq -s 'length')
          TOTAL_REPOS=$(echo $RESPONSE | jq '.data.viewer.repositories.totalCount')
          STARS=$(echo $RESPONSE | jq '.data.viewer.repositories.nodes | map(.stargazerCount) | add // 0')

          echo "Authenticated as: $USER_LOGIN"

          # Combine repos from contributions and owned repos to ensure coverage
          CONTRIB_REPOS=$(echo $RESPONSE | jq -r '.data.viewer.contributionsCollection.commitContributionsByRepository[].repository | .owner.login + "/" + .name')
          OWNED_REPOS=$(echo $RESPONSE | jq -r '.data.viewer.repositories.nodes[] | .owner.login + "/" + .name')
          ALL_REPOS=$(echo -e "${CONTRIB_REPOS}\n${OWNED_REPOS}" | sort -u | grep -v "^/" || true)
          
          TOTAL_ADDED=0
          TOTAL_REMOVED=0

          for REPO in $ALL_REPOS; do
            echo "----------"
            echo "Fetching stats for $REPO..."
            STATS="[]"
            # Retry loop for 202 status (GitHub computing stats)
            for i in {1..5}; do
              FETCHED=$(gh api "repos/$REPO/stats/contributors" --cache 1h 2>/dev/null)
              if echo "$FETCHED" | jq -e 'type == "array"' >/dev/null 2>&1; then
                STATS="$FETCHED"
                break
              fi
              echo "  Waiting for GitHub to compute stats (attempt $i)..."
              sleep 3
            done

            USER_STATS=$(echo "$STATS" | jq -c --arg LOGIN "$USER_LOGIN" '.[] | select(.author.login == $LOGIN)')
            if [ ! -z "$USER_STATS" ] && [ "$USER_STATS" != "null" ]; then
               # Use a slightly lower epoch (start of year minus 7 days) to catch the first week of the year
               COMPARE_EPOCH=$((START_EPOCH - 604800))
               W_ADDED=$(echo "$USER_STATS" | jq --arg EPOCH "$COMPARE_EPOCH" '.weeks[] | select(.w >= ($EPOCH|tonumber)) | .a' | awk '{s+=$1} END {print s+0}')
               W_REMOVED=$(echo "$USER_STATS" | jq --arg EPOCH "$COMPARE_EPOCH" '.weeks[] | select(.w >= ($EPOCH|tonumber)) | .d' | awk '{s+=$1} END {print s+0}')
               echo "  Added: $W_ADDED, Removed: $W_REMOVED"
               TOTAL_ADDED=$((TOTAL_ADDED + W_ADDED))
               TOTAL_REMOVED=$((TOTAL_REMOVED + W_REMOVED))
            else
               echo "  No contribution stats found for $USER_LOGIN in this repo."
            fi
          done

          echo "----------"
          echo "FINAL TOTALS - Added: $TOTAL_ADDED, Removed: $TOTAL_REMOVED"

          # Update the professional table in README.md (using more flexible regex)
          sed -i "s/Nidhin's GitHub Statistics.*$/Nidhin's GitHub Statistics ($YEAR)/" README.md
          sed -i "s/\*\*Total Commits\*\*[ ]*|[ ]*\*\*[0-9]*\*\*/\*\*Total Commits\*\* | \*\*$COMMITS\*\*/" README.md
          sed -i "s/\*\*Pull Requests\*\*[ ]*|[ ]*\*\*[0-9]*\*\*/\*\*Pull Requests\*\* | \*\*$PRS\*\*/" README.md
          sed -i "s/\*\*Lines of Code (Added)\*\*[ ]*|[ ]*\*\*[0-9]*\*\*/\*\*Lines of Code (Added)\*\* | \*\*$TOTAL_ADDED\*\*/" README.md
          sed -i "s/\*\*Lines of Code (Removed)\*\*[ ]*|[ ]*\*\*[0-9]*\*\*/\*\*Lines of Code (Removed)\*\* | \*\*$TOTAL_REMOVED\*\*/" README.md
          sed -i "s/\*\*Repositories\*\*[ ]*|[ ]*\*\*[0-9]*\*\*/\*\*Repositories\*\* | \*\*$TOTAL_REPOS\*\*/" README.md
          sed -i "s/\*\*Stars Earned\*\*[ ]*|[ ]*\*\*[0-9]*\*\*/\*\*Stars Earned\*\* | \*\*$STARS\*\*/" README.md
          sed -i "s/\*\*Active Contribution Days\*\*[ ]*|[ ]*\*\*[0-9]*\*\*/\*\*Active Contribution Days\*\* | \*\*$ACTIVE_DAYS\*\*/" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update yearly statistics [skip ci]" || echo "No changes to commit"
          git push
