name: Update Stats Table
on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Professional Statistics
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          # Get User Info and Creation Year
          USER_DATA=$(gh api graphql -f query='query { viewer { login createdAt } }')
          USER_LOGIN=$(echo $USER_DATA | jq -r '.data.viewer.login')
          CREATED_AT=$(echo $USER_DATA | jq -r '.data.viewer.createdAt')
          START_YEAR=$(date -d "$CREATED_AT" +%Y)
          CURRENT_YEAR=$(date +%Y)
          
          echo "Authenticated as: $USER_LOGIN"
          echo "Account created in: $START_YEAR"

          # 1. Gather ALL Repositories (Owned + Contributed To)
          REPO_QUERY="query {
            viewer {
              repositories(first: 100, ownerAffiliations: OWNER) {
                nodes { name owner { login } }
              }
              repositoriesContributedTo(first: 100, contributionTypes: [COMMIT, PULL_REQUEST]) {
                nodes { name owner { login } }
              }
            }
          }"
          REPO_RESPONSE=$(gh api graphql -f query="$REPO_QUERY")
          ALL_REPOS=$(echo $REPO_RESPONSE | jq -r '.data.viewer.repositories.nodes[], .data.viewer.repositoriesContributedTo.nodes[] | .owner.login + "/" + .name' | sort -u | grep -v "^/" || true)

          # 2. Fetch Yearly Stats (Commits, PRs, Active Days)
          TOTAL_COMMITS=0
          TOTAL_PRS=0
          TOTAL_ACTIVE_DAYS=0
          
          YEAR_COMMITS=0
          YEAR_PRS=0
          YEAR_ACTIVE_DAYS=0

          for YEAR in $(seq $START_YEAR $CURRENT_YEAR); do
            echo "Fetching stats for year $YEAR..."
            START_DATE="${YEAR}-01-01T00:00:00Z"
            END_DATE="${YEAR}-12-31T23:59:59Z"
            if [ "$YEAR" == "$CURRENT_YEAR" ]; then
              END_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            fi

            Y_QUERY="query(\$from: DateTime!, \$to: DateTime!) {
              viewer {
                contributionsCollection(from: \$from, to: \$to) {
                  totalCommitContributions
                  totalPullRequestContributions
                  contributionCalendar {
                    totalContributions
                    weeks {
                      contributionDays {
                        contributionCount
                      }
                    }
                  }
                }
              }
            }"
            Y_STATS=$(gh api graphql -f query="$Y_QUERY" -f from="$START_DATE" -f to="$END_DATE")
            
            C=$(echo $Y_STATS | jq '.data.viewer.contributionsCollection.totalCommitContributions')
            P=$(echo $Y_STATS | jq '.data.viewer.contributionsCollection.totalPullRequestContributions')
            A=$(echo $Y_STATS | jq '.data.viewer.contributionsCollection.contributionCalendar.weeks[].contributionDays[] | select(.contributionCount > 0)' | jq -s 'length')
            
            TOTAL_COMMITS=$((TOTAL_COMMITS + C))
            TOTAL_PRS=$((TOTAL_PRS + P))
            TOTAL_ACTIVE_DAYS=$((TOTAL_ACTIVE_DAYS + A))

            if [ "$YEAR" == "$CURRENT_YEAR" ]; then
              YEAR_COMMITS=$C
              YEAR_PRS=$P
              YEAR_ACTIVE_DAYS=$A
            fi
          done

          # 3. Fetch Stars and Total Repos
          META_QUERY="query {
            viewer {
              repositories(first: 100, ownerAffiliations: OWNER) {
                totalCount
                nodes { stargazerCount }
              }
            }
          }"
          META_DATA=$(gh api graphql -f query="$META_QUERY")
          TOTAL_REPOS=$(echo $META_DATA | jq '.data.viewer.repositories.totalCount')
          STARS=$(echo $META_DATA | jq '.data.viewer.repositories.nodes | map(.stargazerCount) | add // 0')

          # 4. Fetch LOC (All-Time and Current Year)
          TOTAL_ADDED=0
          TOTAL_REMOVED=0
          YEAR_ADDED=0
          YEAR_REMOVED=0
          
          START_OF_YEAR_EPOCH=$(date -d "${CURRENT_YEAR}-01-01" +%s)

          for REPO in $ALL_REPOS; do
            echo "Fetching LOC stats for $REPO..."
            STATS="[]"
            for i in {1..5}; do
              FETCHED=$(gh api "repos/$REPO/stats/contributors" 2>/dev/null)
              if echo "$FETCHED" | jq -e 'type == "array"' >/dev/null 2>&1; then
                STATS="$FETCHED"
                break
              fi
              sleep 2
            done

            USER_STATS=$(echo "$STATS" | jq -c --arg LOGIN "$USER_LOGIN" '.[] | select(.author != null and (.author.login | ascii_downcase == ($LOGIN | ascii_downcase)))')
            
            if [ ! -z "$USER_STATS" ] && [ "$USER_STATS" != "null" ]; then
               # All-time LOC
               R_A=$(echo "$USER_STATS" | jq '.weeks[] | .a' | awk '{s+=$1} END {print s+0}')
               R_D=$(echo "$USER_STATS" | jq '.weeks[] | .d' | awk '{s+=$1} END {print s+0}')
               TOTAL_ADDED=$((TOTAL_ADDED + R_A))
               TOTAL_REMOVED=$((TOTAL_REMOVED + R_D))

               # Current Year LOC (Filter by week epoch, include week before Jan 1st to be safe)
               COMPARE_EPOCH=$((START_OF_YEAR_EPOCH - 604800))
               Y_R_A=$(echo "$USER_STATS" | jq --arg EPOCH "$COMPARE_EPOCH" '.weeks[] | select(.w >= ($EPOCH|tonumber)) | .a' | awk '{s+=$1} END {print s+0}')
               Y_R_D=$(echo "$USER_STATS" | jq --arg EPOCH "$COMPARE_EPOCH" '.weeks[] | select(.w >= ($EPOCH|tonumber)) | .d' | awk '{s+=$1} END {print s+0}')
               YEAR_ADDED=$((YEAR_ADDED + Y_R_A))
               YEAR_REMOVED=$((YEAR_REMOVED + Y_R_D))
            fi
          done

          echo "Final Totals - Commits: $TOTAL_COMMITS ($YEAR_COMMITS), Added: $TOTAL_ADDED ($YEAR_ADDED)"

          # 5. Build and Replace the Stats Table using Python for robustness
          export YEAR_COMMITS YEAR_PRS YEAR_ADDED YEAR_REMOVED YEAR_ACTIVE_DAYS
          export TOTAL_COMMITS TOTAL_PRS TOTAL_ADDED TOTAL_REMOVED TOTAL_ACTIVE_DAYS
          export TOTAL_REPOS STARS CURRENT_YEAR
          
          python3 <<'EOF'
          import os
          import re

          # Fetch data from environment
          cur_y = os.environ['CURRENT_YEAR']
          y_commits = os.environ['YEAR_COMMITS']
          y_prs = os.environ['YEAR_PRS']
          y_added = os.environ['YEAR_ADDED']
          y_removed = os.environ['YEAR_REMOVED']
          y_active = os.environ['YEAR_ACTIVE_DAYS']

          t_commits = os.environ['TOTAL_COMMITS']
          t_prs = os.environ['TOTAL_PRS']
          t_added = os.environ['TOTAL_ADDED']
          t_removed = os.environ['TOTAL_REMOVED']
          t_active = os.environ['TOTAL_ACTIVE_DAYS']
          
          t_repos = os.environ['TOTAL_REPOS']
          t_stars = os.environ['STARS']

          # Build the Markdown table
          table = [
              f"| Global Statistics | {cur_y} (Yearly) | Total (All Time) |",
              f"| :--- | :--- | :--- |",
              f"| **Total Commits** | **{y_commits}** | **{t_commits}** |",
              f"| **Pull Requests** | **{y_prs}** | **{t_prs}** |",
              f"| **Lines of Code (Added)** | **{y_added}** | **{t_added}** |",
              f"| **Lines of Code (Removed)** | **{y_removed}** | **{t_removed}** |",
              f"| **Repositories** | **-** | **{t_repos}** |",
              f"| **Stars Earned** | **-** | **{t_stars}** |",
              f"| **Active Contribution Days** | **{y_active}** | **{t_active}** |"
          ]
          stats_table = "\n".join(table)

          with open('README.md', 'r') as f:
              content = f.read()

          # Replace the table content
          pattern = r'(### 📊 Nidhin\'s GitHub Statistics \(\d{4}\)\n\n<div align="center">\n\n)(.*?)(?=\n\n</div>)'
          replacement = r'\1' + stats_table
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          # Update the header year if it changed
          new_content = re.sub(r'### 📊 Nidhin\'s GitHub Statistics \(\d{4}\)', f'### 📊 Nidhin\'s GitHub Statistics ({cur_y})', new_content)

          with open('README.md', 'w') as f:
              f.write(new_content)
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update comprehensive statistics [skip ci]" || echo "No changes to commit"
          git push
